#####################################
# BED DRYER MACRO FOR SOVOL SV08
# 
# Usage:
#   BED_DRYER TEMP=80 TIME=12h    Start drying
#   BED_DRYER_STOP                Cancel drying
#   BED_DRYER_STATUS              Check remaining time
#
# Time formats: 12h, 360m, 21600s, or just number (assumes minutes)
#####################################

[gcode_macro BED_DRYER]
description: Heat bed for filament drying. Usage: BED_DRYER TEMP=80 TIME=12h
variable_target_temp: 0
variable_total_seconds: 0
gcode:
    {% set temp = params.TEMP|default(80)|int %}
    {% set time_str = params.TIME|default("6h")|string|lower %}
    
    # Parse time - supports: 12h, 360m, 21600s, or number (assumes minutes)
    {% if 'h' in time_str %}
        {% set value = time_str|replace('h','')|float %}
        {% set seconds = (value * 3600)|int %}
    {% elif 'm' in time_str %}
        {% set value = time_str|replace('m','')|float %}
        {% set seconds = (value * 60)|int %}
    {% elif 's' in time_str %}
        {% set seconds = time_str|replace('s','')|int %}
    {% else %}
        {% set seconds = (time_str|float * 60)|int %}
    {% endif %}
    
    {% set hours = (seconds / 3600)|round(1) %}
    {% set minutes = (seconds / 60)|int %}
    
    # Disable idle timeout - set longer than any drying cycle (48 hours)
    SET_IDLE_TIMEOUT TIMEOUT=172800
    
    # Store values for status check
    SET_GCODE_VARIABLE MACRO=BED_DRYER VARIABLE=target_temp VALUE={temp}
    SET_GCODE_VARIABLE MACRO=BED_DRYER VARIABLE=total_seconds VALUE={seconds}
    
    # Cancel any existing dryer timer
    UPDATE_DELAYED_GCODE ID=_BED_DRYER_TIMER DURATION=0
    
    # Start heating
    M140 S{temp}
    
    # Console output
    {action_respond_info("BED DRYER: Starting at %d°C for %.1f hours (%d minutes)" % (temp, hours, minutes))}
    {action_respond_info("BED DRYER: Idle timeout extended for drying cycle")}
    M117 Drying {temp}C / {hours}h
    
    # Start countdown timer
    UPDATE_DELAYED_GCODE ID=_BED_DRYER_TIMER DURATION={seconds}
    
    # Start status update loop (every 10 min)
    UPDATE_DELAYED_GCODE ID=_BED_DRYER_STATUS_LOOP DURATION=600

[delayed_gcode _BED_DRYER_TIMER]
gcode:
    # Restore default idle timeout (10 min)
    SET_IDLE_TIMEOUT TIMEOUT=600
    
    M140 S0
    UPDATE_DELAYED_GCODE ID=_BED_DRYER_STATUS_LOOP DURATION=0
    SET_GCODE_VARIABLE MACRO=BED_DRYER VARIABLE=target_temp VALUE=0
    SET_GCODE_VARIABLE MACRO=BED_DRYER VARIABLE=total_seconds VALUE=0
    {action_respond_info("BED DRYER: Complete! Bed heater off.")}
    {action_respond_info("BED DRYER: Idle timeout restored to 600 seconds")}
    M117 Drying complete!

[delayed_gcode _BED_DRYER_STATUS_LOOP]
gcode:
    {% set temp = printer["gcode_macro BED_DRYER"].target_temp %}
    {% if temp > 0 %}
        {% set bed_temp = printer.heater_bed.temperature|round(1) %}
        {action_respond_info("BED DRYER: Running at %.1f°C (target: %d°C)" % (bed_temp, temp))}
        UPDATE_DELAYED_GCODE ID=_BED_DRYER_STATUS_LOOP DURATION=600
    {% endif %}

[gcode_macro BED_DRYER_STOP]
description: Stop bed drying
gcode:
    # Restore default idle timeout (10 min)
    SET_IDLE_TIMEOUT TIMEOUT=600
    
    UPDATE_DELAYED_GCODE ID=_BED_DRYER_TIMER DURATION=0
    UPDATE_DELAYED_GCODE ID=_BED_DRYER_STATUS_LOOP DURATION=0
    M140 S0
    SET_GCODE_VARIABLE MACRO=BED_DRYER VARIABLE=target_temp VALUE=0
    SET_GCODE_VARIABLE MACRO=BED_DRYER VARIABLE=total_seconds VALUE=0
    {action_respond_info("BED DRYER: Stopped. Bed heater off.")}
    {action_respond_info("BED DRYER: Idle timeout restored to 600 seconds")}
    M117 Dryer stopped

[gcode_macro BED_DRYER_STATUS]
description: Check bed dryer status
gcode:
    {% set temp = printer["gcode_macro BED_DRYER"].target_temp %}
    {% if temp > 0 %}
        {% set bed_temp = printer.heater_bed.temperature|round(1) %}
        {action_respond_info("BED DRYER: Active - Bed at %.1f°C (target: %d°C)" % (bed_temp, temp))}
    {% else %}
        {action_respond_info("BED DRYER: Not running")}
    {% endif %}