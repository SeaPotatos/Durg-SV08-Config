[gcode_macro HEAT_SOAK]
description: Heat soak bed, nozzle @ 170C. Background by default. Auto-cancels if print starts.
gcode:
    {% set TEMP = params.TEMP|default(80)|int %}
    {% set TIME = params.TIME|default(10)|int %}
    {% set WAIT = params.WAIT|default(0)|int %}
    {% set SOAK_SECONDS = TIME * 60 %}
    
    {% if printer.print_stats.state == "printing" %}
        {action_respond_info("Print in progress. Heat soak cancelled.")}
    {% else %}
        SAVE_GCODE_STATE NAME=heat_soak_state
        M140 S{TEMP}
        M104 S170
        {action_respond_info("Heat soak: Bed %d°C for %d min. Start print anytime." % (TEMP, TIME))}
        UPDATE_DELAYED_GCODE ID=heat_soak_cancel_check DURATION={SOAK_SECONDS}
    {% endif %}

[delayed_gcode heat_soak_cancel_check]
gcode:
    {% if printer.print_stats.state != "printing" %}
        {action_respond_info("Heat soak complete.")}
        RESTORE_GCODE_STATE NAME=heat_soak_state
    {% else %}
        {action_respond_info("Heat soak: Print detected, auto-cancelled.")}
    {% endif %}
