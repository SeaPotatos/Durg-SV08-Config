 # For Eddy USB/Duo, include the mcu and temperature sensor sections.
# Omit for Eddy Coil
[mcu eddy]
# Or whatever is appropriate for CAN
serial: /dev/serial/by-id/usb-Klipper_rp2040_50443404101A8F1C-if00
restart_method: command

[temperature_sensor btt_eddy_mcu]
sensor_type: temperature_mcu
sensor_mcu: eddy
min_temp: 10
max_temp: 100

[temperature_sensor btt_eddy]
sensor_type: Generic 3950
sensor_pin: eddy:gpio26

# For all Eddy (USB/Duo/Coil)
[probe_eddy_ng btt_eddy]
sensor_type: btt_eddy
# Eddy USB/Duo values below. For Eddy Coil, replace these two with mcu/bus for your setup.
i2c_mcu: eddy
i2c_bus: i2c0f
#BEFORE v4
#x_offset: -14.903
#y_offset: -9.997
#V4 EDDY
x_offset: -1 
y_offset: 40
#tap_drive_current: 16
#reg_drive_current: 16
tap_adjust_z: 0.105
tap_target_z: -0.950
tap_samples: 5
tap_samples_stddev: 0.025
tap_max_samples: 10
tap_threshold: 250
tap_butter_order: 2
tap_butter_lowcut: 3
tap_butter_highcut: 25
max_errors: 3
samples_per_second: 500
tap_start_z: 2.6
calibration_z_max: 5
home_trigger_height: 2.0
scan_sample_time: 0.030

